<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - Oloolua Forest</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .dashboard-card {
            background: white;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-header h3 {
            margin: 0;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary:hover {
            background: #219150;
        }

        .preview-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-top: 1rem;
            display: none;
        }

        .recent-uploads {
            margin-top: 2rem;
        }

        .upload-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
        }

        .upload-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-tree"></i>
                Oloolua Forest
            </a>
            <div class="nav-links">
                <a href="index.html">View Site</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div class="user-info">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h2 id="userName">Welcome, Member</h2>
                    <span id="userRole" style="color: #666; font-size: 0.9rem;">Role</span>
                </div>
            </div>
            <button class="logout-btn" onclick="AuthService.logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="dashboard-grid">
            <!-- Upload Photo Card -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-camera"></i> Upload Photo</h3>
                </div>
                <form id="uploadPhotoForm">
                    <div class="form-group">
                        <label>Select Image</label>
                        <input type="file" id="photoInput" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label>Caption</label>
                        <input type="text" id="photoCaption" placeholder="Enter a caption">
                    </div>
                    <img id="photoPreview" class="preview-image">
                    <button type="submit" class="btn-primary">Upload to Gallery</button>
                </form>
            </div>

            <!-- Add Activity Card -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-calendar-plus"></i> Add Activity</h3>
                </div>
                <form id="addActivityForm">
                    <div class="form-group">
                        <label>Activity Title</label>
                        <input type="text" id="activityTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="activityDate" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="activityDesc" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image (Optional)</label>
                        <input type="file" id="activityImage" accept="image/*">
                    </div>
                    <button type="submit" class="btn-primary">Publish Activity</button>
                </form>
            </div>

            <!-- Quick Links Card -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3><i class="fas fa-link"></i> Quick Actions</h3>
                </div>
                <div style="display: flex; flex-direction: column; gap: 1rem;">

                    <div class="recent-uploads">
                        <h4>Recent Uploads</h4>
                        <div id="recentUploadsList">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import AuthService from './auth.js';
        import { supabase } from './services/supabase.js';

        // Check Auth
        (async () => {
            const user = await AuthService.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Display User Info
            document.getElementById('userName').textContent = `Welcome, ${user.email}`;
            document.getElementById('userRole').textContent = 'Group Member';
            loadRecentUploads();
        })();

        // Handle Logout
        document.querySelector('.logout-btn').addEventListener('click', () => {
            AuthService.logout();
        });

        // Handle Photo Preview
        const photoInput = document.getElementById('photoInput');
        const photoPreview = document.getElementById('photoPreview');

        photoInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    photoPreview.src = e.target.result;
                    photoPreview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // Handle Photo Upload to Supabase
        document.getElementById('uploadPhotoForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const file = photoInput.files[0];
            const caption = document.getElementById('photoCaption').value;

            if (file) {
                try {
                    // 1. Upload to Supabase Storage
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const filePath = `gallery/${fileName}`;

                    const { error: uploadError, data } = await supabase.storage
                        .from('images')
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    const { data: { publicUrl } } = supabase.storage
                        .from('images')
                        .getPublicUrl(filePath);

                    // 2. Save to Database
                    const { error: dbError } = await supabase
                        .from('gallery')
                        .insert([{
                            image_url: publicUrl,
                            caption: caption,
                            created_at: new Date().toISOString()
                        }]);

                    if (dbError) throw dbError;

                    alert('Photo uploaded successfully to Supabase!');
                    this.reset();
                    photoPreview.style.display = 'none';
                    loadRecentUploads();
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
        });

        // Handle Activity Add to Supabase
        document.getElementById('addActivityForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const title = document.getElementById('activityTitle').value;
            const date = document.getElementById('activityDate').value;
            const desc = document.getElementById('activityDesc').value;
            const imageInput = document.getElementById('activityImage');

            try {
                let imageUrl = 'placeholder.jpg';

                if (imageInput.files[0]) {
                    const file = imageInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const filePath = `activities/${fileName}`;

                    const { error: uploadError } = await supabase.storage
                        .from('images')
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    const { data: { publicUrl } } = supabase.storage
                        .from('images')
                        .getPublicUrl(filePath);
                    
                    imageUrl = publicUrl;
                }

                const { error: dbError } = await supabase
                    .from('activities')
                    .insert([{
                        title,
                        date,
                        description: desc,
                        image_url: imageUrl
                    }]);

                if (dbError) throw dbError;

                alert('Activity published successfully to Supabase!');
                this.reset();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        // Load Recent Uploads from Supabase
        async function loadRecentUploads() {
            const { data: gallery, error } = await supabase
                .from('gallery')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(3);

            if (error) {
                console.error('Error loading gallery:', error);
                return;
            }

            const list = document.getElementById('recentUploadsList');
            if (!list) return;
            list.innerHTML = '';

            gallery.forEach(photo => {
                const div = document.createElement('div');
                div.className = 'upload-item';
                div.innerHTML = `
                    <img src="${photo.image_url}" alt="Upload">
                    <div>
                        <div style="font-weight: 500;">${photo.caption || 'No caption'}</div>
                        <div style="font-size: 0.8rem; color: #888;">${new Date(photo.created_at).toLocaleDateString()}</div>
                    </div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>

</html>
