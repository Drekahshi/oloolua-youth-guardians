<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Stream - Oloolua Youth Guardians</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
        }

        .stream-container {
            height: 100vh;
            width: 100vw;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* Hide scrollbar but keep functionality */
        .stream-container::-webkit-scrollbar {
            display: none;
        }
        .stream-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .stream-slide {
            flex: 0 0 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            position: relative;
        }

        .stream-slide img {
            max-width: 95%;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            border-radius: 8px;
            background: #111; /* Dark placeholder */
        }

        .nav-controls {
            position: fixed;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 1000;
            transform: translateY(-50%);
        }

        .nav-btn {
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.6);
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            color: #27ae60;
            background: rgba(0,0,0,0.5);
        }

        .stream-info {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            z-index: 1000;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            font-family: 'Roboto', sans-serif;
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1001;
            color: white;
            text-decoration: none;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn:hover {
            background: #27ae60;
        }

        @media (max-width: 768px) {
            .nav-controls {
                display: none;
            }
            .stream-slide img {
                max-width: 100%;
                max-height: 85vh;
                border-radius: 0;
            }
        }
    </style>
</head>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>

            function init() {
                totalEl.textContent = imagePaths.length;
                
                imagePaths.forEach((path, index) => {
                    const slide = document.createElement('div');
                    slide.className = 'stream-slide';
                    const img = document.createElement('img');
                    img.src = path;
                    img.alt = 'Oloolua Photo';
                    img.loading = 'lazy';
                    slide.appendChild(img);
                    container.appendChild(slide);
                });

                // Update counter on scroll
                container.addEventListener('scroll', () => {
                    const index = Math.round(container.scrollLeft / window.innerWidth);
                    currentEl.textContent = index + 1;
                });
            }

            nextBtn.addEventListener('click', () => {
                container.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
            });

            prevBtn.addEventListener('click', () => {
                container.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
            });

            // Keyboard Support
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowRight') nextBtn.click();
                if (e.key === 'ArrowLeft') prevBtn.click();
            });

            init();
